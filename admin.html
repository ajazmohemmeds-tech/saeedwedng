<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Management - Saeed & Ansi</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@100..900&family=Pinyon+Script&display=swap" rel="stylesheet">
</head>
<body class="admin-body">
    <div class="admin-container">
        <header class="admin-header">
            <h1 class="admin-title">Guest Management</h1>
            <p class="admin-subtitle">GENERATE PERSONALIZED LINKS</p>
        </header>

        <section class="admin-card">
            <h2 class="card-section-title">Add New Guest</h2>
            <div class="admin-input-group">
                <label for="new-guest-name">GUEST NAME</label>
                <input type="text" id="new-guest-name" placeholder="E.G. SYED & FAMILY">
            </div>
            <div class="admin-input-group">
                <label for="new-guest-id">UNIQUE ID (SLUG)</label>
                <div class="slug-input-wrapper">
                    <input type="text" id="new-guest-id" placeholder="syed-family">
                    <button id="btn-auto-slug" class="btn-micro">AUTO</button>
                </div>
            </div>
            <button id="btn-save-guest" class="btn-action-primary">GENERATE & SAVE LINK</button>
            <div id="result-link-area" class="result-area hidden">
                <p class="result-label">PERSONALIZED LINK:</p>
                <div class="copy-box">
                    <input type="text" id="generated-link" readonly>
                    <button id="btn-copy-link" class="btn-copy">COPY</button>
                </div>
            </div>
        </section>

        <section class="admin-card mt-4">
            <h2 class="card-section-title">Invited Guests & Status</h2>
            <div class="table-responsive">
                <table class="guest-table">
                    <thead>
                        <tr>
                            <th>NAME</th>
                            <th>ID</th>
                            <th>STATUS</th>
                            <th>PARTY</th>
                            <th>ACTION</th>
                        </tr>
                    </thead>
                    <tbody id="guest-list-body">
                        <!-- Loaded from Firebase -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
